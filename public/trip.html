<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripShip - Trip</title>
  <style>
    body { font-family: system-ui; padding: 2rem; text-align: center; }
    .spinner { width: 40px; height: 40px; margin: 2rem auto; border: 3px solid #e0e0e0; border-top-color: #1a237e; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #1a237e; }
  </style>
</head>
<body>
  <p>فتح الرحلة في تطبيق TripShip... | Opening trip in TripShip...</p>
  <div class="spinner"></div>
  <p id="fallback" style="display:none; margin-top: 2rem;">
    <a id="storeLink" href="#">تحميل التطبيق | Download App</a>
  </p>
  <script>
    (function() {
      const path = window.location.pathname;
      const match = path.match(/\/trip\/([a-zA-Z0-9-]+)/);
      const tripId = match ? match[1] : (new URLSearchParams(window.location.search).get('id') || '');
      const appScheme = 'tripship://trip/' + tripId;
      const isAndroid = /Android/i.test(navigator.userAgent);
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      const playStore = 'https://play.google.com/store/apps/details?id=com.tripship.app';
      const appStore = 'https://apps.apple.com/app/tripship/id000000000'; // Replace with real App Store ID

      function redirectToStore() {
        document.querySelector('.spinner').style.display = 'none';
        const fallback = document.getElementById('fallback');
        const link = document.getElementById('storeLink');
        link.href = isAndroid ? playStore : (isIOS ? appStore : playStore);
        fallback.style.display = 'block';
        window.location.href = link.href;
      }

      if (!tripId) {
        redirectToStore();
        return;
      }

      let opened = false;
      if (isAndroid) {
        const intentUrl = 'intent://trip/' + tripId + '#Intent;scheme=tripship;package=com.tripship.app;end';
        window.location.href = intentUrl;
        opened = true;
      } else if (isIOS) {
        window.location.href = appScheme;
        opened = true;
      }

      setTimeout(redirectToStore, 2500);
    })();
  </script>
</body>
</html>
